{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="{% static 'core/login.css' %}">
</head>
<body>
    <div class="login-container">
        <h2>Bienvenido</h2>
        <form method="post">
            {% csrf_token %}
            <!-- Django pone usuario y contraseña aquí -->
            {{ form.as_p }}
            <button class="btn"><a href="{% url 'profile_list' %}"> Entrar </a></button>
        </form>
    </div>
</body>
</html>
